name: Auto Sync Deploy Fork
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
      - name: Add deploy fork remote
        run: |
          git remote add deploy_fork https://jjangminii:${{ secrets.DEPLOY_TOKEN }}@github.com/jjangminii/38-SOPKATHON-WEB-WEB3.git
          git config user.name "jjangminii"
          git config user.email "wjdals030328@catholic.ac.kr"
      - name: Push dev to deploy fork main
        run: git push -f deploy_fork main:main
      - name: Clean up remote
        run: git remote remove deploy_fork
